name: mario-cpp

on:
  push:
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: >
          cmake -S mario-cpp -B build
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Headless Smoke
        shell: bash
        run: |
          if [ -f build/bin/mario.exe ]; then
            exe=build/bin/mario.exe
          else
            exe=build/bin/mario
          fi
          "$exe" --headless --ticks 600 --assets-dir mario-cpp/assets
